<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallpaper Designer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.png" type="image/png">
</head>

<body>
  <canvas id="background-canvas" aria-hidden="true"></canvas>
  <div id="ui-stage">
    <div class="app-shell">
      <div class="app-frame">
        <div id="main-container">
          <div id="title-bar">
            <div id="close" role="button" tabindex="0" aria-label="Collapse window" title="Collapse window"></div>
            <hr id="hr1">
            <hr id="hr2">
            <hr id="hr3">
            <hr id="hr4">
            <hr id="hr5">
            <hr id="hr6">
            <h1>Wallpaper Designer</h1>
          </div>
          <div id="workspace-shell">
            <div id="workspace">
              <section id="editor">
                <div id="input-canvas-container">
                  <table id="input-canvas"></table>
                  <div id="pattern-nav">
                    <div id="left-arrow"></div>
                    <button id="invert" class="icon-button" aria-label="Invert Design" title="Invert Design">
                      <svg viewBox="0 0 12 12" aria-hidden="true">
                        <rect x="1" y="1" width="4" height="4"></rect>
                        <rect x="7" y="1" width="4" height="4"></rect>
                        <rect x="1" y="7" width="4" height="4"></rect>
                        <rect x="7" y="7" width="4" height="4"></rect>
                      </svg>
                    </button>
                    <div id="right-arrow"></div>
                  </div>
                </div>
              </section>
              <aside id="control-stack">
                <div id="size-fields">
                  <div class="input-box">
                    <label for="width">Width:</label>
                    <input type="number" id="width" value="128" min="8" width="4">
                  </div>
                  <div class="input-box">
                    <label for="height">Height:</label>
                    <input type="number" id="height" value="128" min="8" size="4">
                  </div>
                </div>
                <div id="design-controls">
                  <button id="save">Save</button>
                  <button id="load">Load</button>
                  <button id="clear">Clear</button>
                  <button id="download">Download</button>
                </div>
                <div class="control-row color-row">
                  <div class="swatch-control">
                    <label for="white-input">White</label>
                    <div class="input-container swatch-input" id="white-swatch">
                      <input type="color" name="custom-white" id="white-input" value="#fdfae7">
                    </div>
                  </div>
                  <div class="swatch-control">
                    <label for="black-input">Black</label>
                    <div class="input-container swatch-input" id="black-swatch">
                      <input type="color" name="custom-black" id="black-input" value="#100F0F">
                    </div>
                  </div>
                </div>
                <div class="scale-control">
                  <div class="scale-labels">
                    <p onclick="setRangeValue(1)" style="--stop: 0;">1</p>
                    <p onclick="setRangeValue(2)" style="--stop: 1;">2</p>
                    <p onclick="setRangeValue(3)" style="--stop: 2;">4</p>
                    <p onclick="setRangeValue(4)" style="--stop: 3;">8</p>
                    <p onclick="setRangeValue(5)" style="--stop: 4;">16</p>
                    <p onclick="setRangeValue(6)" style="--stop: 5;">32</p>
                    <p onclick="setRangeValue(7)" style="--stop: 6;">64</p>
                  </div>
                  <div class="scale-slider-shell">
                    <div class="scale-rail" aria-hidden="true"></div>
                    <div class="scale-thumb" aria-hidden="true"></div>
                    <input type="range" name="download-scale" id="scale-selector" min="1" max="7" value="4" step="1"
                      class="custom-range">
                  </div>
                </div>
              </aside>
            </div>
          </div>
        </div>
      </div>
      <div id="output-canvas-container" style="display: none;">
        <canvas id="output-canvas"></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>

</html>
